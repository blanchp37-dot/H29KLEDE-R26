name: H29KLEDE-Bl4nc7OS Builder

on:
  repository_dispatch:
  workflow_dispatch:
permissions:
  contents: write

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  CONFIG_FILE: Config/LEDE/HinLink_H29K.config
  Feeds_SH: Scripts/LEDE/HinLink_H29K/Feeds.sh
  Settings_SH: Scripts/LEDE/HinLink_H29K/Settings.sh
  Packages_SH: Scripts/LEDE/HinLink_H29K/Packages.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Ho_Chi_Minh

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 准备完成
      uses: actions/checkout@main

    - name: 检查服务器配置
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "已知CPU型号(降序): 7763，8370C，8272CL，8171M，E5-2673 \n"
        echo -e "-------------- ------------CPU信息------------------------------------------"
        echo "CPU物理数量:$(cat /proc/cpuinfo| grep "physical id"| sort| uniq| wc -l)"
        echo "CPU线程数量: $(nproc)"
        echo -e "CPU核心及版本信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "-------------------------------内存信息-------------------------------------------"
        echo "已安装内存详细信息："
        echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
        echo "-----------------------------硬盘信息---------------------------------------------"
        echo -e  "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l)"
        echo "硬盘详情："
        echo "系统空间        类型   总数  已用  可用  使用率"
        df -Th

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        echo "------------------------------- 更新并安装依赖 -------------------------------"
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        echo "------------------------------- 设置工作目录及时区 -------------------------------"
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 克隆源代码
      working-directory: /workdir
      run: |
        df -hT $PWD

        git clone $REPO_URL -b $REPO_BRANCH lede
        cd lede

        git checkout 03c6123bb

        echo "=============================="
        echo "Current commit:"
        git rev-parse HEAD
        git log -1 --oneline
        echo "=============================="

        ln -sf /workdir/lede $GITHUB_WORKSPACE/lede

    - name: 加载自定义订阅源
      run: |
        [ -e Files ] && cp -rf Files/LEDE/HinLink_H29K/* lede/
        mkdir -p lede/package/feeds/modem
        cp -rf Files/Modem/quectel_cm_5G lede/package/feeds/modem
        chmod +x $Feeds_SH
        cd lede
        bash $GITHUB_WORKSPACE/$Feeds_SH

    - name: 更新拉取源
      run: cd lede && ./scripts/feeds update -a

    - name: 安装拉取源
      run: | 
        cd lede
        ./scripts/feeds install -a
        echo "===== Checking packages ====="

        grep -R "Package: luci-app-argon-config" feeds || true
        grep -R "Package: luci-app-adguardhome" feeds || true
        grep -R "Package: filebrowser" feeds || true
        grep -R "Package: luci-app-openvpn" feeds || true

        echo "===== Done ====="

    - name: 加载自定义配置
      run: |
        [ -e "$CONFIG_FILE" ] && mv "$CONFIG_FILE" lede/.config
        chmod +x $Settings_SH
        chmod +x $Packages_SH
        cd lede
        bash $GITHUB_WORKSPACE/$Settings_SH
#       bash $GITHUB_WORKSPACE/$Packages_SH

    - name: 下载软件包
      id: package
      run: |
        cd lede
        make defconfig
        grep -i wireguard .config || true
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd lede
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 检查空间使用情况
      if: (!cancelled())
      run: df -hT

    - name: 上传bin目录
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: lede/bin

    - name: 整理文件
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd lede/bin/targets/*/*
        rm -rf packages *.buildinfo *.json *.manifest
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件目录
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 准备发布说明
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        # 生成版本标签
        echo "release_tag=H29KLEDE-Bl4nc7OS-$(date +"%Y.%m.%d-%H%M%S")" >> $GITHUB_OUTPUT
        
        # 生成发布说明
        cat <<EOF > release.txt
        🚀 H29KLEDE-Bl4nc7OS Build
        
        📅 编译时间: $(date +"%Y-%m-%d %H:%M:%S %Z")
        💻 设备型号: HinLink H29K Board 1.3
              固件: H29KLEDE-Bl4nc7OS
        
        🔗 源码仓库: $REPO_URL
        🌱 代码分支: $REPO_BRANCH
        
        🔐 默认凭据:
          IP: 192.168.1.1
          用户名: root
          密码: password

        <div style="display: flex; justify-content: space-between; flex-wrap: wrap;">
          <img src="https://github.com/user-attachments/assets/3a154eb4-5f06-443a-b839-4edfeaa91eb9" width="32%" style="margin: 0.5%">
          <img src="https://github.com/user-attachments/assets/8c842cdb-8212-42c8-913a-cafb8977565a" width="32%" style="margin: 0.5%">
          <img src="https://github.com/user-attachments/assets/86f20e91-0b94-488a-8351-7918d909faa8" width="32%" style="margin: 0.5%">
        </div>
        <div style="display: flex; justify-content: space-between; flex-wrap: wrap;">
          <img src="https://github.com/user-attachments/assets/a1a0a160-cb33-4550-846c-56c678ffd5ab" width="49%" style="margin: 0.5%">
          <img src="https://github.com/user-attachments/assets/5be3fbed-0fe2-4239-a0f0-10069e5d27fb" width="49%" style="margin: 0.5%">
        </div>
        EOF
        
        echo "status=success" >> $GITHUB_OUTPUT
      # 备注：生成格式化的发布说明

    - name: 上传固件以发布
      uses: softprops/action-gh-release@master
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*
